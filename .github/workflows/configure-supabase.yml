name: Configure Supabase credentials

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure app.js
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app.js')
          text = path.read_text(encoding='utf-8')
          text = text.replace('const SUPABASE_URL = "https://TU-PROYECTO.supabase.co";', 'const SUPABASE_URL = "https://dbrdacsfahiubvyetobx.supabase.co";')
          text = text.replace('const SUPABASE_ANON_KEY = "TU-ANON-KEY";', 'const SUPABASE_ANON_KEY = "sb_publishable_uW9T2kNYrwHvCjwvuKwnLg_GB9SgHb-";')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js
          if git diff --cached --quiet; then
            echo "Supabase credentials already configured."
          else
            git commit -m "Set Supabase credentials"
            git push
          fi

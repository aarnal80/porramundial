name: Link matchday styles

on:
  push:
    paths:
      - '.github/workflows/link-matchdays-css.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  link-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link matchday stylesheet
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          if 'matchdays.css' not in text:
              text = text.replace('<link rel="stylesheet" href="sync.css" />', '<link rel="stylesheet" href="sync.css" />\n    <link rel="stylesheet" href="matchdays.css" />')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit if needed
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Load matchday stylesheet"
            git push
          fi
